<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 218 60" fill="none" role="img" aria-label="Eu Jatopê">
  <defs>
    <linearGradient id="markBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e91e8c"/>
      <stop offset="100%" stop-color="#880e4f"/>
    </linearGradient>
  </defs>

  <!-- Mark: rounded square -->
  <rect width="60" height="60" rx="15" fill="url(#markBg)"/>

  <!-- Left hair strand -->
  <path d="M20 9 C17 19 23 27 20 37 C17 46 19 51 20 53"
        stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.45" fill="none"/>
  <!-- Center hair strand (thicker, main) -->
  <path d="M30 7 C26 17 34 25 30 35 C27 44 29 48 30 51"
        stroke="white" stroke-width="2.8" stroke-linecap="round" fill="none"/>
  <!-- Right hair strand -->
  <path d="M40 9 C43 19 37 27 40 37 C43 46 41 51 40 53"
        stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.45" fill="none"/>

  <!-- Gold color drip at bottom of center strand -->
  <circle cx="30" cy="53" r="4.5" fill="#d4a843"/>

  <!-- "TINTA NO" label — small caps, muted -->
  <text x="76" y="22"
        font-family="'Outfit', system-ui, -apple-system, sans-serif"
        font-size="10.5"
        font-weight="700"
        fill="#8a8a8a"
        letter-spacing="3">TINTA NO</text>

  <!-- "Cabelo" main wordmark — large italic serif -->
  <text x="74" y="50"
        font-family="'Instrument Serif', Georgia, 'Times New Roman', serif"
        font-size="26"
        font-weight="700"
        font-style="italic"
        fill="#c2185b"
        letter-spacing="-0.5">Cabelo</text>
</svg>
